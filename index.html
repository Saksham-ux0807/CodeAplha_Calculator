<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeAlpha - Calculator Engine</title>
    <style>
        :root {
            --calc-bg: #111827;
            --display-bg: #1f2937;
            --btn-orange: #f97316;
            --btn-gray: #374151;
            --text-light: #f9fafb;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #030712;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }

        .calculator {
            background-color: var(--calc-bg);
            padding: 1.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            width: 320px;
        }

        #display {
            width: 100%;
            height: 70px;
            background-color: var(--display-bg);
            border: none;
            outline: none;
            border-radius: 0.75rem;
            color: var(--text-light);
            font-size: 2rem;
            text-align: right;
            padding: 0 1rem;
            margin-bottom: 1.5rem;
            box-sizing: border-box;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.75rem;
        }

        button {
            height: 60px;
            border: none;
            border-radius: 50%;
            font-size: 1.25rem;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-light);
            background-color: var(--btn-gray);
            transition: opacity 0.1s, transform 0.1s;
        }

        button:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        button.operator {
            background-color: var(--btn-orange);
        }

        button.clear {
            background-color: #ef4444;
        }

        button.equal {
            background-color: #10b981;
            border-radius: 0.75rem;
            grid-column: span 2;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <input type="text" id="display" readonly placeholder="0">
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button onclick="appendValue('/')" class="operator">÷</button>
            <button onclick="appendValue('*')" class="operator">&times;</button>
            <button onclick="deleteLast()">⌫</button>
            
            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button onclick="appendValue('-')" class="operator">-</button>
            
            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button onclick="appendValue('+')" class="operator">+</button>
            
            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button onclick="calculate()" class="equal">=</button>
            
            <button onclick="appendValue('0')" style="grid-column: span 2; border-radius: 0.75rem;">0</button>
            <button onclick="appendValue('.')">.</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');

        function appendValue(val) {
            // Prevent consecutive operators
            const operators = ['+', '-', '*', '/'];
            if (operators.includes(val) && operators.includes(display.value.slice(-1))) {
                display.value = display.value.slice(0, -1) + val;
                return;
            }
            display.value += val;
        }

        function clearDisplay() {
            display.value = '';
        }

        function deleteLast() {
            display.value = display.value.slice(0, -1);
        }

        function calculate() {
            try {
                if (display.value === '') return;
                
                // Address safe evaluation execution
                let result = eval(display.value);
                
                if (result === Infinity || result === -Infinity) {
                    display.value = "Error: Div by 0";
                } else {
                    display.value = parseFloat(result.toFixed(4)); // Standardize decimal floats
                }
            } catch (error) {
                display.value = 'Syntax Error';
            }
        }

        // Keyboard Support Interceptor
        document.addEventListener('keydown', (e) => {
            if ((e.key >= '0' && e.key <= '9') || e.key === '.') appendValue(e.key);
            if (e.key === '+' || e.key === '-' || e.key === '*' || e.key === '/') appendValue(e.key);
            if (e.key === 'Enter' || e.key === '=') calculate();
            if (e.key === 'Backspace') deleteLast();
            if (e.key === 'Escape') clearDisplay();
        });
    </script>
</body>
</html>
